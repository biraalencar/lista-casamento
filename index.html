<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Premium</title><style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:linear-gradient(45deg,#8e44ad,#e84393);color:#fff;padding:25px;text-align:center}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,.1);display:flex;gap:15px}
.card.disabled{opacity:.5}
img{width:120px;border-radius:10px}
.info{flex:1}
button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:6px;cursor:pointer}
.btn{background:#8e44ad;color:#fff}
.btn2{background:#27ae60;color:#fff}
.btn3{background:#3498db;color:#fff}
button:disabled{background:#999}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:300px;text-align:center}
</style></head>
<body><header>
<h1 id="titulo">Bira & Noiva 💍</h1>
<p id="mensagem">Sua presença é nosso maior presente ❤️</p>
</header><div class="container"><h2>Lista de Presentes</h2>
<div id="lista"></div><hr><h2>Admin</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button><div id="admin" style="display:none">
<h3>Novo Item</h3>
<input id="nome" placeholder="Nome">
<input id="img" placeholder="Imagem URL">
<input id="qtd" type="number" placeholder="Qtd">
<input id="valor" type="number" placeholder="Valor">
<button class="btn" onclick="addItem()">Salvar</button><h3>Reservas</h3>
<button class="btn3" onclick="exportarCSV()">Exportar CSV</button>
<div id="reservas"></div><h3>Visual</h3>
<input id="novoTitulo" placeholder="Título">
<input id="novaMsg" placeholder="Mensagem">
<button class="btn3" onclick="salvarVisual()">Salvar</button>
</div></div><div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitulo"></h3>
<input id="nomeUser" placeholder="Seu nome">
<button class="btn" onclick="confirmar()">Confirmar</button>
</div>
</div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script>
const firebaseConfig={apiKey:"AIzaSyDfUi9Ijo5b_-pL_0cbpZhbgKtH2PcRhl0",authDomain:"lista-casamento-uet.firebaseapp.com",projectId:"lista-casamento-uet"}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()
const auth=firebase.auth()

let acaoAtual=null

function login(){auth.signInWithEmailAndPassword(email.value,senha.value).then(()=>admin.style.display='block')}

function addItem(){db.collection('itens').add({nome:nome.value,img:img.value,qtd:+qtd.value,valor:+valor.value,reservado:0})}

function abrirModal(tipo,id,item){
acaoAtual={tipo,id,item}
modal.style.display='flex'
modalTitulo.innerText=tipo==='pix'?"Pagamento via PIX":"Reservar item"
}

function confirmar(){
let nome=nomeUser.value
if(!nome)return
let {tipo,id,item}=acaoAtual

if(item.reservado>=item.qtd)return

// RESERVA
 db.collection('itens').doc(id).update({reservado:item.reservado+1})

// REGISTRO
 db.collection('reservas').add({nome,tipo,valor:item.valor,item:item.nome,data:new Date()})

// PIX QR
 if(tipo==='pix'){
  let chave="SUA_CHAVE_PIX_AQUI"
  let url=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${chave}`
  window.open(url)
 }

modal.style.display='none'
nomeUser.value=''
}

function salvarVisual(){db.collection('config').doc('visual').set({titulo:novoTitulo.value,mensagem:novaMsg.value})}

function exportarCSV(){
 db.collection('reservas').get().then(s=>{
  let csv='Nome,Tipo,Valor\n'
  s.forEach(d=>{let r=d.data();csv+=`${r.nome},${r.tipo},${r.valor}\n`})
  let blob=new Blob([csv])
  let a=document.createElement('a')
  a.href=URL.createObjectURL(blob)
  a.download='reservas.csv'
  a.click()
 })
}

function render(){
 db.collection('itens').onSnapshot(s=>{
  lista.innerHTML=''
  s.forEach(doc=>{
   let i=doc.data()
   let esgotado=i.reservado>=i.qtd
   lista.innerHTML+=`
   <div class="card ${esgotado?'disabled':''}">
    <img src="${i.img}">
    <div class="info">
    <h3>${i.nome}</h3>
    <p>${i.reservado}/${i.qtd}</p>
    <p>R$ ${i.valor}</p>
    <button ${esgotado?'disabled':''} class="btn" onclick='abrirModal("presencial","${doc.id}",${JSON.stringify(i)})'>Reservar</button>
    <button ${esgotado?'disabled':''} class="btn2" onclick='abrirModal("pix","${doc.id}",${JSON.stringify(i)})'>PIX</button>
    </div>
   </div>`
  })
 })

 db.collection('reservas').onSnapshot(s=>{
  reservas.innerHTML=''
  s.forEach(d=>{let r=d.data();reservas.innerHTML+=`<p>${r.nome} - ${r.tipo} - ${r.valor}</p>`})
 })

 db.collection('config').doc('visual').onSnapshot(d=>{
  if(d.exists){titulo.innerText=d.data().titulo;mensagem.innerText=d.data().mensagem}
 })
}

render()
</script></body>
</html>
